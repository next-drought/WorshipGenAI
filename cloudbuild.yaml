steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'GEMINI_API_KEY=$$GEMINI_API_KEY'
      - '-t'
      - 'gcr.io/$PROJECT_ID/worshipgen-ai:$COMMIT_SHA'
      - '.'
    secretEnv: ['GEMINI_API_KEY']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/worshipgen-ai:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'worshipgen-ai'
      - '--image=gcr.io/$PROJECT_ID/worshipgen-ai:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'

images:
  - 'gcr.io/$PROJECT_ID/worshipgen-ai:$COMMIT_SHA'
